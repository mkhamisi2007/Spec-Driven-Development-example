# Netlify Configuration with Security Headers

[build]
  command = "echo 'Static site - no build required'"
  publish = "."

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - Allow only necessary resources
    Content-Security-Policy = "default-src 'self'; script-src 'self'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'self'; form-action 'self' https://formspree.io; frame-ancestors 'none'"

    # Strict Transport Security - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Additional security headers
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

# Redirect HTTP to HTTPS (automatic on Netlify, but explicit for clarity)
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Cache configuration
[[headers]]
  for = "/data/translations/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600" # Cache translations for 1 hour

[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000" # Cache JS for 1 year (versioned if changed)

[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000" # Cache CSS for 1 year (versioned if changed)

[[headers]]
  for = "/data/contact-info.json"
  [headers.values]
    Cache-Control = "public, max-age=86400" # Cache contact info for 1 day
