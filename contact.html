<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for inquiries and support">
    <title data-i18n="contact.pageTitle">Contact Us</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/contact-form.css">
    <link rel="icon" href="images/favicon.ico">
</head>
<body>
    <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navigation">
        <span class="hamburger"></span>
    </button>

    <nav id="navigation" class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-link">About</a>
            <a href="products.html" class="nav-link">Products</a>
            <a href="partners.html" class="nav-link">Partners</a>
            <a href="contact.html" class="nav-link" data-i18n="nav.contact">Contact Us</a>
        </div>
        <div class="nav-language">
            <button id="languageSwitcher" class="lang-btn" aria-label="Toggle language">
                <span id="langDisplay">EN</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1 data-i18n="contact.pageTitle">Contact Us</h1>
            <p class="tagline" data-i18n="contact.pageDescription">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
        </header>

        <section id="contact-section" class="content-section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-bottom: 2rem;">
                <!-- Contact Form -->
                <div class="contact-form-wrapper">
                    <h2 data-i18n="contact.formHeading">Send us a Message</h2>

                    <div id="formErrors" class="form-errors" aria-live="polite" aria-atomic="true"></div>
                    <div id="formStatus" class="form-status" aria-live="polite" aria-atomic="true"></div>
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar"></div>
                    </div>

                    <form id="contactForm" novalidate>
                        <div class="form-group">
                            <label for="name" data-i18n="form.nameLabel">Your Name</label>
                            <input
                                type="text"
                                id="name"
                                name="name"
                                required
                                data-i18n-placeholder="form.namePlaceholder"
                                placeholder="John Doe"
                                maxlength="255"
                            >
                        </div>

                        <div class="form-group">
                            <label for="email" data-i18n="form.emailLabel">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                required
                                data-i18n-placeholder="form.emailPlaceholder"
                                placeholder="john@example.com"
                            >
                        </div>

                        <div class="form-group">
                            <label for="subject" data-i18n="form.subjectLabel">Subject</label>
                            <input
                                type="text"
                                id="subject"
                                name="subject"
                                required
                                data-i18n-placeholder="form.subjectPlaceholder"
                                placeholder="What is this about?"
                                maxlength="500"
                            >
                        </div>

                        <div class="form-group">
                            <label for="message" data-i18n="form.messageLabel">Message</label>
                            <textarea
                                id="message"
                                name="message"
                                required
                                rows="6"
                                maxlength="5000"
                                data-i18n-placeholder="form.messagePlaceholder"
                                placeholder="Tell us more..."
                            ></textarea>
                        </div>

                        <button type="submit" id="submitBtn" class="submit-button" data-i18n="form.submitButton">
                            Send Message
                        </button>
                    </form>
                </div>

                <!-- Contact Information -->
                <div class="contact-info-wrapper">
                    <h2 data-i18n="contact.infoHeading">Contact Information</h2>
                    <div id="contactInfo" class="contact-info">
                        <div class="info-item">
                            <h3 data-i18n="contact.addressLabel">Address</h3>
                            <p id="address"></p>
                        </div>
                        <div class="info-item">
                            <h3 data-i18n="contact.emailLabel">Email</h3>
                            <p id="email-display"></p>
                        </div>
                        <div class="info-item">
                            <h3 data-i18n="contact.phoneLabel">Phone</h3>
                            <p id="phone"></p>
                        </div>
                        <div class="info-item">
                            <h3 data-i18n="contact.businessHoursLabel">Business Hours</h3>
                            <p id="hours"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p data-i18n="common.copyright">&copy; 2026 Software Store. All rights reserved.</p>
    </footer>

    <!-- Language & Translation Scripts -->
    <script src="js/i18n.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Initialize language preferences and theme on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await theme.initLanguagePreference();
            theme.setupLanguageSwitcher();
        });
    </script>

    <script src="js/contact.js"></script>
</body>
</html>
